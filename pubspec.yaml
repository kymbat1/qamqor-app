name: womens_health
description: A women's health Flutter app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cloud_firestore: ^5.4.4
  crypto: ^3.0.3
  cupertino_icons: ^1.0.8
  firebase_auth: ^5.3.0
  firebase_core: ^3.6.0
  flutter_dotenv: ^5.1.0
  geolocator: ^13.0.2
  http: ^1.2.2
  image_picker: ^1.0.7
  intl: ^0.20.2
  provider: ^6.1.5
  shared_preferences: ^2.1.0
  table_calendar: ^3.1.2

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
